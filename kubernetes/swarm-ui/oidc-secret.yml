# OIDC client secret for Swarm-UI authentication
# Get the client secret from Keycloak: NathanRahm realm → Clients → ollama → Credentials
# (Swarm-UI shares the 'ollama' client in Keycloak)
#
# Create the namespace and secret before installing/upgrading the chart:
#   kubectl create namespace swarm-ui
#   kubectl create secret generic oidc-client-secret -n swarm-ui --from-literal=client-secret=<secret>
#
# Or apply this file after filling in the base64-encoded secret.
# This file is intentionally not part of the Helm chart because it contains
# environment-specific secret material:
#   echo -n 'your-secret' | base64

apiVersion: v1
kind: Secret
metadata:
  name: oidc-client-secret
  namespace: swarm-ui
type: Opaque
data:
  client-secret: <base64-encoded-secret>
