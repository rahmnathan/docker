# Gateway API HTTPRoute for Swarm-UI
# Replaces swarm-ui/templates/ingress.yml
# Note: This route is protected by OIDC via SecurityPolicy

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: swarm-ui
  namespace: swarm-ui
spec:
  parentRefs:
    - name: main-gateway
      namespace: envoy-gateway-system
  hostnames:
    - swarm-ui.nathanrahm.com
  rules:
    - backendRefs:
        - name: swarm-ui
          port: 7801
