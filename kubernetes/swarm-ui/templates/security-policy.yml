# OIDC authentication with Keycloak via Envoy Gateway.
# Prereq: create oidc-client-secret in the swarm-ui namespace.

apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: keycloak-oidc
  namespace: swarm-ui
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: swarm-ui
  oidc:
    provider:
      issuer: https://login.nathanrahm.com/realms/NathanRahm
    clientID: ollama
    clientSecret:
      name: oidc-client-secret
    scopes:
      - openid
      - profile
    redirectURL: https://swarm-ui.nathanrahm.com/oauth2/callback
