# Gateway API HTTPRoute for Audiobookshelf
# Replaces: audiobookshelf/templates/ingress.yml

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: audiobookshelf
  namespace: audiobookshelf
spec:
  parentRefs:
    - name: main-gateway
      namespace: envoy-gateway-system
  hostnames:
    - audiobooks.nathanrahm.com
  rules:
    - backendRefs:
        - name: audiobookshelf
          port: 80
