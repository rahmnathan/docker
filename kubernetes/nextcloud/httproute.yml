# Gateway API HTTPRoute for Nextcloud
# Replaces ingress config in nextcloud/values.yml
# Includes .well-known redirects/rewrites for CalDAV, CardDAV, WebFinger, NodeInfo

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nextcloud
  namespace: nextcloud
spec:
  parentRefs:
    - name: main-gateway
      namespace: envoy-gateway-system
  hostnames:
    - nextcloud.nathanrahm.com
  rules:
    # CalDAV redirect - required for calendar client discovery
    - matches:
        - path:
            type: Exact
            value: /.well-known/caldav
      filters:
        - type: RequestRedirect
          requestRedirect:
            path:
              type: ReplaceFullPath
              replaceFullPath: /remote.php/dav
            statusCode: 301

    # CardDAV redirect - required for contact client discovery
    - matches:
        - path:
            type: Exact
            value: /.well-known/carddav
      filters:
        - type: RequestRedirect
          requestRedirect:
            path:
              type: ReplaceFullPath
              replaceFullPath: /remote.php/dav
            statusCode: 301

    # WebFinger rewrite - required for federation
    - matches:
        - path:
            type: Exact
            value: /.well-known/webfinger
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /index.php/.well-known/webfinger
      backendRefs:
        - name: nextcloud
          port: 8080

    # NodeInfo rewrite - required for federation
    - matches:
        - path:
            type: Exact
            value: /.well-known/nodeinfo
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /index.php/.well-known/nodeinfo
      backendRefs:
        - name: nextcloud
          port: 8080

    # host-meta rewrite - for federation/WebFinger
    - matches:
        - path:
            type: Exact
            value: /.well-known/host-meta
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /public.php?service=host-meta
      backendRefs:
        - name: nextcloud
          port: 8080

    # host-meta.json rewrite
    - matches:
        - path:
            type: Exact
            value: /.well-known/host-meta.json
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /public.php?service=host-meta-json
      backendRefs:
        - name: nextcloud
          port: 8080

    # Default route - all other traffic
    # Note: Sensitive path blocking (/build, /config, etc.) handled by Nextcloud's .htaccess
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: nextcloud
          port: 8080
