  configs:
    previews.config.php: |-
      <?php
      $CONFIG = array (
        'enable_previews' => true,
        'enabledPreviewProviders' => array (
          'OC\Preview\Movie',
          'OC\Preview\PNG',
          'OC\Preview\JPEG',
          'OC\Preview\GIF',
          'OC\Preview\BMP',
          'OC\Preview\XBitmap',
          'OC\Preview\MP3',
          'OC\Preview\MP4',
          'OC\Preview\TXT',
          'OC\Preview\MarkDown',
          'OC\Preview\PDF',
          'OC\Preview\HEIC'
        ),
      );

# Install ffmpeg and launch persistent background workers for AI task completion
lifecycle:
  postStartCommand:
    - /bin/bash
    - -c
    - >
      nohup bash -c "apt update -y && apt install -y ffmpeg" >/dev/null 2>&1 &
      for i in {1..4}; do nohup su -s /bin/sh www-data -c 'while true; do php occ background-job:worker -v "OC\TaskProcessing\SynchronousBackgroundJob"; sleep 1; done' >/dev/null 2>&1 & done

externalDatabase:
  enabled: true
  type: postgresql
  host: postgres-rw.postgres-18.svc.cluster.local
  user: nextcloud
  password: pw123
  database: nextcloud
  existingSecret:
    enabled: false

persistence:
  enabled: true
  existingClaim: nextcloud-nextcloud-2
  accessMode: ReadWriteOnce
  size: 150Gi

imaginary:
  enabled: true

cronjob:
  enabled: true



