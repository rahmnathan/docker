# Gateway API HTTPRoute for Grafana
# Replaces ingress config in prometheus/values.yml

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  parentRefs:
    - name: main-gateway
      namespace: envoy-gateway-system
  hostnames:
    - grafana.nathanrahm.com
  rules:
    - backendRefs:
        - name: kube-prometheus-stack-grafana
          port: 80
