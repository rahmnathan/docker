# OIDC Authentication with Keycloak via Envoy Gateway
#
# Prerequisites:
# 1. Create Keycloak client "frigate" in NathanRahm realm with:
#    - Client authentication: ON
#    - Valid redirect URIs: https://frigate.nathanrahm.com/*
#    - Web origins: https://frigate.nathanrahm.com
#
# 2. Create the OIDC client secret (get value from Keycloak > Clients > frigate > Credentials):
#    kubectl create secret generic oidc-client-secret -n frigate \
#      --from-literal=client-secret=<YOUR_KEYCLOAK_CLIENT_SECRET>
#
# 3. Apply this policy:
#    kubectl apply -f frigate/security-policy.yml
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: keycloak-oidc
  namespace: frigate
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: frigate
  oidc:
    provider:
      issuer: https://login.nathanrahm.com/realms/NathanRahm
    clientID: frigate
    clientSecret:
      name: oidc-client-secret
    scopes:
      - openid
      - profile
    redirectURL: https://frigate.nathanrahm.com/oauth2/callback
