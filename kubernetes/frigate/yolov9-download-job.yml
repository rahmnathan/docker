# YOLOv9 ONNX Model Download Job for Frigate GPU Detection
#
# Downloads pre-built YOLOv9-s-640 ONNX model (27 MB) from GitHub
# and creates COCO-80 labelmap on the Frigate config PVC.
#
# Prerequisites: Frigate must be deployed first (creates frigate-config PVC)
#
# Usage:
#   kubectl apply -f frigate/yolov9-download-job.yml
#   kubectl logs -n frigate -l job-name=yolov9-download -f
#
# After completion, restart Frigate to load the model:
#   kubectl rollout restart deployment/frigate -n frigate
#
# To re-run (if model gets deleted):
#   kubectl delete job yolov9-download -n frigate
#   kubectl apply -f frigate/yolov9-download-job.yml
apiVersion: batch/v1
kind: Job
metadata:
  name: yolov9-download
  namespace: frigate
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: download
          image: alpine:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              echo "=== Installing curl ==="
              apk add --no-cache curl

              echo "=== Creating model directory ==="
              mkdir -p /config/model_cache

              echo "=== Downloading YOLOv9-s-640 ONNX model ==="
              # Using small variant - good balance of speed/accuracy for 720p cameras
              curl -L -o /config/model_cache/yolov9-s-640.onnx \
                "https://github.com/oritromax/YOLOv9-onnx/raw/master/yolov9-s-640.onnx"

              echo "=== Creating COCO labelmap ==="
              cat > /config/model_cache/coco-80.txt << 'EOF'
              person
              bicycle
              car
              motorcycle
              airplane
              bus
              train
              truck
              boat
              traffic light
              fire hydrant
              stop sign
              parking meter
              bench
              bird
              cat
              dog
              horse
              sheep
              cow
              elephant
              bear
              zebra
              giraffe
              backpack
              umbrella
              handbag
              tie
              suitcase
              frisbee
              skis
              snowboard
              sports ball
              kite
              baseball bat
              baseball glove
              skateboard
              surfboard
              tennis racket
              bottle
              wine glass
              cup
              fork
              knife
              spoon
              bowl
              banana
              apple
              sandwich
              orange
              broccoli
              carrot
              hot dog
              pizza
              donut
              cake
              chair
              couch
              potted plant
              bed
              dining table
              toilet
              tv
              laptop
              mouse
              remote
              keyboard
              cell phone
              microwave
              oven
              toaster
              sink
              refrigerator
              book
              clock
              vase
              scissors
              teddy bear
              hair drier
              toothbrush
              EOF

              echo "=== Verifying downloads ==="
              ls -la /config/model_cache/

              MODEL_SIZE=$(stat -c%s /config/model_cache/yolov9-s-640.onnx 2>/dev/null || stat -f%z /config/model_cache/yolov9-s-640.onnx)
              echo "Model size: $((MODEL_SIZE / 1024 / 1024)) MB"

              if [ "$MODEL_SIZE" -lt 1000000 ]; then
                echo "ERROR: Model file too small, download likely failed"
                exit 1
              fi

              echo "=== Done! ==="
          volumeMounts:
            - name: config
              mountPath: /config
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: frigate-config
