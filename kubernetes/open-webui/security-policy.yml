# kubectl apply -f open-webui/security-policy.yml
# PREREQS: Create secret & update Keycloak redirect URI:
#   kubectl create secret generic oidc-client-secret -n open-webui --from-literal=client-secret=<secret>
#   Keycloak: Add https://ollama.nathanrahm.com/oauth2/callback to "ollama" client (shared client)

apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: keycloak-oidc
  namespace: open-webui
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: ollama
  oidc:
    provider:
      issuer: https://login.nathanrahm.com/realms/NathanRahm
    clientID: ollama
    clientSecret:
      name: oidc-client-secret
    scopes:
      - openid
      - profile
    redirectURL: https://ollama.nathanrahm.com/oauth2/callback
