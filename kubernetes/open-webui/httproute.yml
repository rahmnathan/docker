# Gateway API HTTPRoute for Open-WebUI (LLM Interface)
# Replaces ingress config in open-webui/values.yml

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: open-webui
  namespace: open-webui
spec:
  parentRefs:
    - name: main-gateway
      namespace: envoy-gateway-system
  hostnames:
    - llm.nathanrahm.com
  rules:
    - backendRefs:
        - name: open-webui
          port: 80
      timeouts:
        request: "300s"
        backendRequest: "300s"
