# helm repo add open-webui https://helm.openwebui.com/
# helm -n open-webui upgrade --install open-webui open-webui/open-webui -f open-webui/values.yml
# Gateway API: kubectl apply -f open-webui/httproute.yml -f open-webui/backend-policy.yml
# Gateway API (ollama): kubectl apply -f open-webui/ollama-httproute.yml -f open-webui/security-policy.yml
#   PREREQ: Create OIDC secret first - see open-webui/oidc-secret.yml for instructions

ingress:
  enabled: false

persistence:
  enabled: true
  size: 8Gi

ollama:
  # -- Automatically install Ollama Helm chart from https://otwld.github.io/ollama-helm/. Use [Helm Values](https://github.com/otwld/ollama-helm/#helm-values) to configure
  enabled: true
  ollama:
    gpu:
      enabled: true
      type: 'nvidia'
      number: 1
  persistentVolume:
    enabled: true
  resources:
    requests:
      cpu: "4"
      memory: "6Gi"
    limits:
      cpu: "14"
      memory: "32Gi"
  ingress:
    enabled: false
