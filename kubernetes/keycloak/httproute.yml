# Gateway API HTTPRoute for Keycloak
# Replaces ingress config in keycloak/values.yml

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keycloak
  namespace: keycloak
spec:
  parentRefs:
    - name: main-gateway
      namespace: envoy-gateway-system
  hostnames:
    - login.nathanrahm.com
  rules:
    - backendRefs:
        - name: keycloak-keycloakx-http
          port: 80
