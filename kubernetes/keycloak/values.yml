# helm repo add codecentric https://codecentric.github.io/helm-charts
# helm upgrade --install -n keycloak keycloak codecentric/keycloakx --values keycloak/values.yml
# Theme: kubectl apply -f keycloak/theme-configmap.yml
# Gateway API: kubectl apply -f keycloak/httproute.yml -f keycloak/backend-policy.yml
# Client role access gates: see keycloak/client-role-access.md

image:
  repository: quay.io/keycloak/keycloak
  tag: "26.6"

ingress:
  enabled: false

http:
  relativePath: "/"

command:
  - "/opt/keycloak/bin/kc.sh"
  - "start"
  - "--http-port=8080"
  - "--hostname=https://login.nathanrahm.com"
  - "--spi-theme-static-max-age=-1"
  - "--spi-theme-cache-themes=false"

dbchecker:
  enabled: true

database:
  vendor: postgres
  hostname: postgres-rw.postgres-18.svc.cluster.local
  port: 5432
  username: 'keycloak'
  password: 'pw123'
  database: keycloak

extraVolumes: |
  - name: theme-properties
    configMap:
      name: keycloak-localmovies-theme
      items:
        - key: theme.properties
          path: theme.properties
  - name: theme-css
    configMap:
      name: keycloak-localmovies-theme
      items:
        - key: localmovies.css
          path: localmovies.css

extraVolumeMounts: |
  - name: theme-properties
    mountPath: /opt/keycloak/themes/localmovies/login/theme.properties
    subPath: theme.properties
  - name: theme-css
    mountPath: /opt/keycloak/themes/localmovies/login/resources/css/localmovies.css
    subPath: localmovies.css

extraEnv: |
  - name: KC_BOOTSTRAP_ADMIN_USERNAME
    value: admin
  - name: KC_BOOTSTRAP_ADMIN_PASSWORD
    value: admin
  - name: KC_PROXY
    value: "passthrough"
  - name: JAVA_OPTS_APPEND
    value: >-
      -Djgroups.dns.query={{ include "keycloak.fullname" . }}-headless
