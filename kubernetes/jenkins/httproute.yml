# Gateway API HTTPRoute for Jenkins
# Replaces ingress config in jenkins/values.yml

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jenkins
  namespace: jenkins
spec:
  parentRefs:
    - name: main-gateway
      namespace: envoy-gateway-system
  hostnames:
    - jenkins.nathanrahm.com
  rules:
    - backendRefs:
        - name: jenkins
          port: 8080
