# BackendTLSPolicy for Kibana - ECK uses HTTPS internally with self-signed certs
# Replaces nginx.ingress.kubernetes.io/backend-protocol: HTTPS

apiVersion: gateway.networking.k8s.io/v1alpha3
kind: BackendTLSPolicy
metadata:
  name: kibana-tls
  namespace: monitoring
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: eck-stack-with-logstash-eck-kibana-kb-http
      sectionName: https
  validation:
    caCertificateRefs:
      - group: ""
        kind: Secret
        name: eck-stack-with-logstash-eck-kibana-kb-http-certs-public
    hostname: eck-stack-with-logstash-eck-kibana-kb-http.monitoring.svc
