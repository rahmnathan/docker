## Install CRDs
# helm install elastic-operator elastic/eck-operator -n elastic-system --create-namespace

## Install stack
# helm -n monitoring upgrade --install eck-stack-with-logstash elastic/eck-stack --values elk/values.yaml
# Gateway API: kubectl apply -f elk/httproute.yml -f elk/backend-tls-policy.yml

eck-elasticsearch:
  nodeSets:
    - name: default
      count: 3
      config:
        # Comment out when setting the vm.max_map_count via initContainer, as these are mutually exclusive.
        # For production workloads, it is strongly recommended to increase the kernel setting vm.max_map_count to 262144
        # and leave node.store.allow_mmap unset.
        # ref: https://www.elastic.co/guide/en/cloud-on-k8s/current/k8s-virtual-memory.html
        #
        node.store.allow_mmap: false
      podTemplate:
        spec:
          containers:
            - name: elasticsearch
              resources:
                limits:
                  memory: 2Gi
                requests:
                  memory: 2Gi
eck-kibana:
  enabled: true
  ingress:
    enabled: false
  spec:
    count: 1
    elasticsearchRef:
      name: elasticsearch
eck-beats:
  enabled: true
  serviceAccount:
    name: elastic-beat-filebeat-quickstart
  clusterRoleBinding:
    name: elastic-beat-autodiscover-binding
    subjects:
    - kind: ServiceAccount
      name: elastic-beat-filebeat-quickstart
      namespace: monitoring
    roleRef:
      kind: ClusterRole
      name: elastic-beat-autodiscover
      apiGroup: rbac.authorization.k8s.io
  clusterRole:
      name: elastic-beat-autodiscover
      rules:
      - apiGroups: [""]
        resources:
        - events
        - pods
        - namespaces
        - nodes
        verbs:
        - get
        - watch
        - list
  deployment:
    podTemplate:
      spec:
        serviceAccountName: elastic-beat-filebeat-quickstart
        automountServiceAccountToken: true
        terminationGracePeriodSeconds: 30
        dnsPolicy: ClusterFirstWithHostNet
        hostNetwork: true
        containers:
          - name: filebeat
            securityContext:
              runAsUser: 0
            volumeMounts:
              - name: beat-data
                mountPath: /usr/share/filebeat/data
              - name: varlogcontainers
                mountPath: /var/log/containers
              - name: varlogpods
                mountPath: /var/log/pods
            env:
              - name: NODE_NAME
                valueFrom:
                  fieldRef:
                    fieldPath: spec.nodeName
        volumes:
          - name: beat-data
            emptydir: {}
          - name: varlogcontainers
            hostPath:
              path: /var/log/containers
          - name: varlogpods
            hostPath:
              path: /var/log/pods
  type: filebeat
  config:
    filebeat:
      autodiscover:
        providers:
          - type: kubernetes
            node: ${NODE_NAME}
            hints:
              enabled: true
              default_config:
                type: filestream
                id: kubernetes-container-logs-${data.kubernetes.pod.name}-${data.kubernetes.container.id}
                paths:
                  - /var/log/containers/*${data.kubernetes.container.id}.log
                parsers:
                  - container: {}
                prospector:
                  scanner:
                    fingerprint:
                      enabled: true
                      length: 64
                    symlinks: true
                file_identity.fingerprint: {}
    processors:
      - add_host_metadata: {}
      - add_cloud_metadata: {}
    output.logstash:
      # This needs to be {{logstash-name}}-ls-beats:5044
      hosts: ["logstash-ls-beats-ls-beats:5044"]
eck-logstash:
  enabled: true
  # This is required to be able to set the logstash
  # output of beats in a consistent manner.
  fullnameOverride: "logstash-ls-beats"
  elasticsearchRefs:
    # This clusterName is required to match the environment variables
    # used in the below config.string output section.
    - clusterName: eck
      name: elasticsearch
  pipelines:
    - pipeline.id: main
      config.string: |
        input {
          beats {
            port => 5044
          }
        }
        filter {
          # Promote kubernetes metadata to top level for easier filtering in Kibana
          if [kubernetes] {
            mutate {
              add_field => {
                "k8s_namespace" => "%{[kubernetes][namespace]}"
                "k8s_pod" => "%{[kubernetes][pod][name]}"
                "k8s_container" => "%{[kubernetes][container][name]}"
              }
            }
            # Extract app label - check common label patterns (ECS uses underscores)
            if [kubernetes][labels][app] {
              mutate { add_field => { "k8s_app" => "%{[kubernetes][labels][app]}" } }
            } else if [kubernetes][labels][app_kubernetes_io/name] {
              mutate { add_field => { "k8s_app" => "%{[kubernetes][labels][app_kubernetes_io/name]}" } }
            }
          }

          # Try to parse JSON logs (Spring Boot, Postgres, Envoy, etc.)
          if [message] =~ /^\s*\{/ {
            json {
              source => "message"
              target => "parsed_log"
              skip_on_invalid_json => true
            }
            # Extract log level from JSON
            if [parsed_log][level] {
              mutate { add_field => { "log_level" => "%{[parsed_log][level]}" } }
            }
            # Envoy access logs - derive level from response_code
            if [parsed_log][response_code] {
              if [parsed_log][response_code] >= 500 {
                mutate { add_field => { "log_level" => "ERROR" } }
              } else if [parsed_log][response_code] >= 400 {
                mutate { add_field => { "log_level" => "WARN" } }
              } else {
                mutate { add_field => { "log_level" => "INFO" } }
              }
              # Extract useful Envoy fields
              mutate {
                add_field => {
                  "http_method" => "%{[parsed_log][method]}"
                  "http_status" => "%{[parsed_log][response_code]}"
                }
              }
              if [parsed_log][x-envoy-origin-path] {
                mutate { add_field => { "http_path" => "%{[parsed_log][x-envoy-origin-path]}" } }
              }
              if [parsed_log][:authority] {
                mutate { add_field => { "http_host" => "%{[parsed_log][:authority]}" } }
              }
              # Build readable message for Envoy
              mutate { replace => { "message" => "%{[parsed_log][method]} %{[parsed_log][x-envoy-origin-path]} %{[parsed_log][response_code]}" } }
            } else {
              # Non-Envoy JSON: Extract message
              if [parsed_log][message] {
                mutate { replace => { "message" => "%{[parsed_log][message]}" } }
              } else if [parsed_log][record][message] {
                mutate { replace => { "message" => "%{[parsed_log][record][message]}" } }
              } else if [parsed_log][msg] {
                mutate { replace => { "message" => "%{[parsed_log][msg]}" } }
              }
            }
            # Extract logger name
            if [parsed_log][logger_name] {
              mutate { add_field => { "logger" => "%{[parsed_log][logger_name]}" } }
            } else if [parsed_log][logger] {
              mutate { add_field => { "logger" => "%{[parsed_log][logger]}" } }
            }
            # Extract timestamp if present
            if [parsed_log][@timestamp] {
              date {
                match => [ "[parsed_log][@timestamp]", "ISO8601" ]
                target => "@timestamp"
              }
            }
            # Extract stack trace
            if [parsed_log][stack_trace] {
              mutate { add_field => { "stack_trace" => "%{[parsed_log][stack_trace]}" } }
            }
          }

          # Kubernetes-style logs: I0705, W0705, E0705, F0705
          if ![log_level] and [message] =~ /^[IWEF]\d{4}/ {
            grok {
              match => { "message" => "^(?<k8s_level>[IWEF])\d{4}" }
              tag_on_failure => []
            }
            if [k8s_level] == "I" { mutate { add_field => { "log_level" => "INFO" } } }
            if [k8s_level] == "W" { mutate { add_field => { "log_level" => "WARN" } } }
            if [k8s_level] == "E" { mutate { add_field => { "log_level" => "ERROR" } } }
            if [k8s_level] == "F" { mutate { add_field => { "log_level" => "FATAL" } } }
            mutate { remove_field => [ "k8s_level" ] }
          }

          # GIN framework logs: [GIN] ... | 200 | or | 500 |
          if ![log_level] and [message] =~ /^\[GIN\]/ {
            grok {
              match => { "message" => "\| (?<gin_status>\d{3}) \|" }
              tag_on_failure => []
            }
            if [gin_status] {
              if [gin_status] >= "500" {
                mutate { add_field => { "log_level" => "ERROR" } }
              } else if [gin_status] >= "400" {
                mutate { add_field => { "log_level" => "WARN" } }
              } else {
                mutate { add_field => { "log_level" => "INFO" } }
              }
              mutate {
                add_field => { "http_status" => "%{gin_status}" }
                remove_field => [ "gin_status" ]
              }
            }
          }

          # HTTP access logs (Apache/nginx style): "GET /path" 200 (including WebDAV methods)
          if ![log_level] and [message] =~ /\"(GET|POST|PUT|DELETE|PATCH|HEAD|OPTIONS|PROPFIND|PROPPATCH|MKCOL|COPY|MOVE|LOCK|UNLOCK|REPORT)\s+[^"]+\"\s+\d{3}/ {
            grok {
              match => { "message" => "\"(?<http_method>GET|POST|PUT|DELETE|PATCH|HEAD|OPTIONS|PROPFIND|PROPPATCH|MKCOL|COPY|MOVE|LOCK|UNLOCK|REPORT)\s+(?<http_path>[^\s\"]+)[^\"]*\"\s+(?<http_status>\d{3})" }
              tag_on_failure => []
            }
            if [http_status] {
              if [http_status] >= "500" {
                mutate { add_field => { "log_level" => "ERROR" } }
              } else if [http_status] >= "400" {
                mutate { add_field => { "log_level" => "WARN" } }
              } else {
                mutate { add_field => { "log_level" => "INFO" } }
              }
            }
          }

          # Redis logs: "1:M 05 Jul 2026 20:28:39.197 * message" (* = info, # = warning, - = verbose)
          if ![log_level] and [message] =~ /^\d+:[MCSXW] \d{2} [A-Z][a-z]{2} \d{4}/ {
            grok {
              match => { "message" => "^\d+:[MCSXW] \d{2} [A-Z][a-z]{2} \d{4} [0-9:.]+\s+(?<redis_level>[*#\-.])" }
              tag_on_failure => []
            }
            if [redis_level] == "*" { mutate { add_field => { "log_level" => "INFO" } } }
            if [redis_level] == "#" { mutate { add_field => { "log_level" => "WARN" } } }
            if [redis_level] == "-" { mutate { add_field => { "log_level" => "DEBUG" } } }
            if [redis_level] == "." { mutate { add_field => { "log_level" => "DEBUG" } } }
            mutate { remove_field => [ "redis_level" ] }
          }

          # Logfmt style: ts=... level=info ... (Prometheus operator, etc.)
          if ![log_level] and [message] =~ /level=(info|warn|warning|error|debug)/ {
            grok {
              match => { "message" => "level=(?<log_level>info|warn|warning|error|debug)" }
              tag_on_failure => []
            }
          }

          # Parse standard log levels from plain text (DEBUG, INFO, WARN, etc.) - case insensitive
          if ![log_level] {
            grok {
              match => { "message" => "(?i)[\[\s](?<log_level>debug|info|warn|warning|error|fatal|trace)[\]\s\-]" }
              tag_on_failure => []
            }
          }

          # Filebeat connection messages - classify as INFO/WARN/ERROR
          if ![log_level] and [message] =~ /^(Connecting|Connection|Attempting|Failed|failed)/ {
            if [message] =~ /^(Failed|failed)/ {
              mutate { add_field => { "log_level" => "WARN" } }
            } else {
              mutate { add_field => { "log_level" => "INFO" } }
            }
          }

          # Metrics/stats messages (Filebeat "Non-zero metrics")
          if ![log_level] and [message] =~ /^Non-zero metrics/ {
            mutate { add_field => { "log_level" => "DEBUG" } }
          }

          # Normalize log levels to uppercase
          if [log_level] {
            mutate { uppercase => [ "log_level" ] }
            if [log_level] == "WARNING" { mutate { replace => { "log_level" => "WARN" } } }
          }
        }
        output {
          elasticsearch {
            hosts => [ "${ECK_ES_HOSTS}" ]
            user => "${ECK_ES_USER}"
            password => "${ECK_ES_PASSWORD}"
            ssl_certificate_authorities => "${ECK_ES_SSL_CERTIFICATE_AUTHORITY}"
          }
        }
  services:
    - name: beats
      service:
        spec:
          type: ClusterIP
          ports:
            - port: 5044
              name: "filebeat"
              protocol: TCP
              targetPort: 5044