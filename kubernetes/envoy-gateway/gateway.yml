    - name: https-keycloak
      hostname: login.nathanrahm.com
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - name: keycloak-tls
      allowedRoutes:
        namespaces:
          from: All
    - name: https-openwebui
      hostname: llm.nathanrahm.com
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
