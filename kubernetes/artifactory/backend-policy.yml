# BackendTrafficPolicy for Artifactory
# Replaces nginx.ingress.kubernetes.io/proxy-body-size: 500m

apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: artifactory-policy
  namespace: artifactory
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: artifactory
  requestBuffer:
    limit: 500Mi
